# XcodeGen spec. Generate the Xcode project with:  xcodegen generate
# (install via `brew install xcodegen`). Then open IphoneNotifier.xcodeproj.
name: IphoneNotifier
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set your 10-char Team ID, or configure signing in Xcode

targets:
  IphoneNotifier:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.iphonenotifier
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/IphoneNotifier.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1" # iPhone
    entitlements:
      path: Sources/IphoneNotifier.entitlements
